name: CI/CD — Bone Marrow Transplant Predictor

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Qualité du code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linting (flake8)
        run: |
          pip install flake8
          flake8 src/ app/ tests/ --max-line-length=100 --ignore=E402,W503,E501

      - name: Tests unitaires (pytest)
        run: pytest tests/ -v --tb=short

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image Docker
        run: docker build -t bone-marrow-predictor .
